name: Publish to npm

# Trigger: push a tag matching the versioning scheme:
#   6.10.1, 6.10.2, 6.11.0, 7.0.0, 7.0.1 …
# Create a release tag with:
#   git tag 6.10.1 && git push origin 6.10.1
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Match the Node version used locally; update the `node-version` field
      # if the project ever upgrades.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Sync the package.json version to the Git tag so the two are never out
      # of step. The tag is the source of truth; package.json is updated in-place
      # in the checkout before packing — nothing is committed back to Git.
      - name: Align package.json version to tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          npm version "$TAG" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      # --provenance attaches a signed SLSA provenance attestation to the
      # published package (requires id-token: write above).
      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
